{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="page-container">
    <section class="u-mt-5 text-center">
        <div class="card error-wrapper" style="margin: 0 auto;"> 
            <h1 class="serif-title u-mb-4">Order Confirmed!</h1>
            <p class="text-muted u-mb-5">
                Thank you for your purchase. Your payment was successful and your digital licenses/bookings are now active.
            </p>
            <div class="u-flex-between" style="justify-content: center; gap: 20px; display: flex;">
                <a href="{% url 'profiles:profile' %}" class="btn btn-primary">View My Profile</a>
                <a href="{% url 'home' %}" class="btn btn-outline">Back to Gallery</a>
            </div>
        </div>
    </section>
</div>
{% endblock %}
