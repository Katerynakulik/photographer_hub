{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Photographer Hub{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Soft family, children and women photography sessions and digital photo shop.{% endblock %}">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body>
  {% include "includes/navbar.html" %}

  <main class="container">
    {% if messages %}
      <div class="messages">
        {% for message in messages %}
          <div class="alert alert-{{ message.tags }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  {% include "includes/footer.html" %}
</body>
</html>
