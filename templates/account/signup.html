{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="page-container">
    <div class="auth-wrapper">
        <h2 class="serif-title u-mb-4">{% trans "Sign Up" %}</h2>

        <p class="u-mb-4">{% blocktrans %}Already have an account? <a href="{{ login_url }}" class="remove-link">Sign in</a>.{% endblocktrans %}</p>

        <form class="signup" method="post" action="{% url 'account_signup' %}">
            {% csrf_token %}
            
            <div class="auth-form-body">
                {{ form.as_p }}
            </div>
            
            {% if redirect_field_value %}
            <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}" />
            {% endif %}
            
            <div class="u-mt-5">
                <button type="submit" class="btn btn-primary w-100">{% trans "Create Account" %}</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
